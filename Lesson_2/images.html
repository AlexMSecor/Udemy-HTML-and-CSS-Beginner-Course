<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Images</title>
</head>
<body>
    <h1>This is how we do HTML images!</h1>

    <p>Hey everyone, check this awesome image out:</p>
    <img src="images/carrots.jpg" alt="A bunch of dusty carrots!" height="375" width="500">

    <p>Check this kale out:</p>
    <img src="images/kale.jpg" alt="A bowl of steamed kale!" height="239" height="320">

    <p>Look at this potato:</p>
    <img src="images/potato.jpg" alt="A bowl of raw potatoes on a newspaper." height="480" width="640">
</body>
</html>
